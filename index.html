<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
   



  body 
{
  margin: 0;
  padding: 10px 12px ;
  
  background-color: hsl(47, 88%, 63%);
   flex-direction: column;
  
  line-height: 1.5;
 display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Figtree', sans-serif;

}



.card {
  background-color: white;
  width:  100%;
  max-width: 370px;
  border-radius: 20px 20px 20px 10px;
  padding:  16px;
  box-sizing: border-box;
  box-shadow: 8px 8px 0px #000;
  flex-direction: column;
}

.card > img {
  width: 100%;
  display: block;
  border-radius: 12PX;
  margin-bottom: 0px;
}
h1 {
  font-size: 12px;
  display: inline-block;
  
  background-color: hsl(47, 88%, 63%);
  color: #111;
  border-radius: 4px;
  font-weight: 800;
  letter-spacing: 0.2px;
  padding: 4px 12px;
  margin: 12px  6px;
  
  
}

h2 {
  color: black;
  cursor: pointer;
  transition: color 0.3s ease;
  line-height: 1.2;
  font-weight: 800;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
  font-size: 24px;
  margin: 0 0 10px;
}

h2:hover,
h2:active {
  color: #f4d04e;
}

.description {
  color: hsl(0, 0%, 42%);
  font-size: 16px;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
  font-weight: 500;
  margin: 0 0 12px;
}

.author {
  font-size: 14px;
  color: #000;font-weight: 800;
  letter-spacing: 0.2px;
  display: flex;
  align-items: center;
  gap:  14PX;
}

.author p {
  margin: 0;
}

.author img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin-bottom: 0;
}
  
.date {
  color: hsl(0, 0%, 42%);
  font-weight: 500;
  font-size: 14px;
  margin: 6px 0 10px;
 }

 

    .attribution { font-size: 0.6875rem; text-align: center; margin-top: 20px; }
    .attribution a { color: hsl(228, 45%, 44%); }
    @media (prefers-reduced-motion: reduce) {
  h2 {
    transition: none;
  }

  h2:hover {
    transform: none;
  }
}
  </style>
</head>
<body>
  <main class="card">
    <img src="illustration-article.svg" alt="illustration image">
  

 <h1>Learning</h1>

 <p class="date">Published 21 Dec 2023</p>

  <h2>HTML & CSS foundations</h2>

 <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
   <div class="author">
 <img src="image-avatar.webp" alt="Greg Hooper">
  <p>Greg Hooper</p>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Hanan Edward</a>.
  </footer>
</body>
</html>
